<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<title>CF7:ME Overlay</title>
<link rel="stylesheet" href="css/overlay.css">
</head>
<body>

<!-- Toast container -->
<div id="toast-container"></div>

<!-- Notch: 单行布局，左侧 FPS 区域 + 右侧工具栏按钮 -->
<div id="notch">
    <div id="notch-pill">
        <!-- 左侧：FPS 指标区 -->
        <div id="notch-left">
            <span id="notch-fps" class="notch-fps">--</span>
            <canvas id="notch-sparkline" width="70" height="16"></canvas>
            <canvas id="notch-clock" width="16" height="16"></canvas>
            <span id="notch-expand" class="notch-expand-btn">&#9660;</span>
        </div>
        <!-- 右侧：工具栏按钮（展开时从右往左排列） -->
        <div id="notch-toolbar">
            <button data-key="Q">Q 退出</button>
            <button data-key="W">W 关闭</button>
            <button data-key="R">R 重置</button>
            <button data-key="F">F 全屏</button>
            <button data-key="P">P 截图</button>
            <button data-key="O">O 打开</button>
            <button data-key="LOG">日志</button>
        </div>
    </div>
    <div id="notch-info"></div>
</div>

<script src="modules/bridge.js"></script>
<script src="modules/toast.js"></script>
<script src="modules/notch.js"></script>
<script>
(function() {
    window.addEventListener('load', function() {
        Bridge.send({ type: 'ready' });
    });
})();
</script>
</body>
</html>
