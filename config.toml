flashPlayerPath = "Adobe Flash Player 20.exe"
swfPath = "CRAZYFLASHER7MercenaryEmpire.swf"

# WebView2 / bootstrap + overlay performance diagnostics.
# Keep defaults false while investigating; use env vars or toggle one at a time.
webOverlayLowEffects = false
webOverlayDisableCssAnimations = false
webOverlayDisableVisualizers = false
# 60 caps overlay JS/canvas rAF loops; 0/off/unlimited lets WebView2 follow display refresh.
webOverlayFrameRateLimit = 60
webView2DisableGpu = false
webView2AdditionalArgs = ""
nativeCursorOverlay = true

# Windows per-app GPU preference 管理
# off  = 不干预系统 GPU 偏好（默认）
# auto = 探测到独显 + 当前接 AC 电源 同时满足时，把 launcher 与 msedgewebview2.exe 标为高性能 GPU
# on   = 无条件标记（副作用自担：续航下降 / Optimus 回传 PCIe 流量上升 / 部分链路脆弱机型负向）
# 所有模式都会在退出时清理写入的注册表条目，不污染系统。
#
# 适用性提示：仅在"独显直连 / MUX 直连 / 桌面机独显"场景下建议开 auto。
# Optimus 混合输出 (dGPU 渲染 → iGPU 扫描输出) 的游戏本/笔记本不建议开启：
#   - 独显渲染结果需经 PCIe 回传 iGPU 合成，额外 1-2 帧延迟，鼠标跟手感下降
#   - 断续的 WebView2 合成负载使独显频繁 P-state 抖动，反而不如核显稳态
#   - 核显仍需承担 DWM 合成与 Flash 渲染，不会因此归零
# 判断方法：BIOS 里若有"独显直连 / MUX Switch / Discrete Graphics Mode"可切换硬连接独显，即适用；
#          否则保持 off，等上游削减 WebView2 合成复杂度后再评估。
gpuPreference = "off"

# 开发专用：Ctrl+G 切换 WebView2 opaque + Flash 隐藏的 GPU 合成成本探针。
# 用于实测 alpha blend + Flash 出图占 iGPU 的比重（任务管理器对照曲线）。
# 玩家版**必须保持 false** —— 否则误触可能导致游戏画面消失。
# 也可用环境变量 CF7_DEV_GPU_PROBE=1 临时启用，不入仓库。
devGpuProbeHotkey = false

# Native HUD（Panel-Only 架构 + NotchOverlay/ToastOverlay/RightContextWidget/ComboWidget 接管 web HUD）。
# 默认 false（仍以 web 渲染为主路径）；true = 启用 C# native HUD + panel host controller。
# 详见 launcher/README.md「useNativeHud=true」段；env: CF7_NATIVE_HUD=1 一次性覆盖。
useNativeHud = true

# Desktop 顶层 ULW cursor（默认 true，2026-05 推 default-on）。
# true  = DesktopCursorOverlay：scale 跟 GuardianForm.ClientSize（窗口级），跨 anchor 自由
# false = 旧 CursorOverlayForm（OverlayBase 子类，anchor-bound，scale 跟 FlashHostPanel-based viewport）
# 注释掉 / 缺失此 key 即落代码默认 true。env: CF7_DESKTOP_CURSOR=0 一键回滚。
# useDesktopCursorOverlay = true

# Panel 态显式接管前台 + WebView 持焦点（默认 true，2026-05 引入）。
# 修首次点击仅切焦点、二次点击才生效的"卡手"问题。
# true  = ResumeForPanel 剥 WS_EX_NOACTIVATE + SetForegroundWindow + MoveFocus(Programmatic)；
#         idle 收尾把 Flash 推回前台。
# false = 完全等价旧行为（NOACTIVATE 永挂、首次点击只切焦点）。
# env: CF7_PANEL_TAKE_FG=0 一键回滚。详见 launcher/README.md「焦点不变量」段。
# webOverlayPanelTakeForeground = true

# ============================================================
# 渲染合成层诊断（B0 overlay 合并验证用，默认全部 OFF，玩家版保持 false）
# ============================================================
# 全部默认 false。建议成对开 layerAudit + ulwMonitor 收集 PR 前/后基线；
# etwDwm 需 admin，仅作 churn 频次交叉验证。
#
# 输出统一前缀 [LayerAudit] / [UlwMonitor] / [EtwMpo] / [Diag]，写入 logs/launcher.log。
# env 覆盖：CF7_DIAG_LAYER_AUDIT / CF7_DIAG_ULW_MONITOR / CF7_DIAG_ETW_DWM / CF7_DIAG_INTERVAL_SEC

# 结构性快照：启动 + ready + shutdown 三次 dump 当前进程全部 top-level HWND
# 及其 WS_EX_LAYERED / TRANSPARENT / TOOLWINDOW 等标志。无 admin。
# 用途：B0 合并前后对比 layered top-level 数量是否真的下降（deterministic 结构指标）。
diagLayerAudit = false

# 持续监控 OverlayBase.CommitBitmap 调用：每 interval 秒报一次 commit 频率 +
# 单次 UpdateLayeredWindow 耗时分布 (p50/p95/p99/max)。无 admin。
# 用途：p99 是 "DWM 让我们等多久" 的进程内代理；高配机平均压不出 MPO 病，
# 但 p99 仍能看出 churn 尖刺。B0 后频率应降、p99 应平。
diagUlwMonitor = false

# 订阅 Microsoft-Windows-Dwm-Core ETW provider 并按秒计数事件总量。**需 admin**，
# 非 admin 启动会 log warn 并静默 skip，不影响正常运行。
# 用途：DWM 内部活动频次的客观指标，硬件无关，最直接反映合成器繁忙程度。
diagEtwDwm = false

# 报告周期（秒），范围 [1, 60]。同时影响 UlwMonitor 与 EtwMpo 两路。
diagReportIntervalSec = 5

# ============================================================
# 诊断日志分层原则（说明用，无 toml 开关）
# ============================================================
# 详见 docs/诊断设施与首轮基线-2026-05-24.md §1。新增诊断日志前先归层：
#
# Tier 1 永久"账本"（事件 / 阈值触发，体量极低，绝不开关化）：
#   [Activation] / [PerfGate] / [FgWatchdog] / [FocusRestore]
#   ——偶发卡顿复盘的唯一数据源。"关 = 拆黑匣子"，禁。
#
# Tier 2 永久"探针"（后台轮询 / 启动期一次性，默认 ON + env 急停）：
#   [UIFreezeProbe]：CF7_DIAG_FOCUS_PROBE=0 关闭后台线程（疑似探针自身导致问题时用）
#   [RevealProbe]：boot 期 ~10 行，无急停（成本可忽略）
#
# Tier 3 基线测量器（高频连续 / 需 admin，默认 OFF，按需开）：
#   即上方 §59-86 的 diagLayerAudit / diagUlwMonitor / diagEtwDwm。
