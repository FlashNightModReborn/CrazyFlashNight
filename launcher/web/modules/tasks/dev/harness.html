<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>任务面板 Harness</title>
    <!-- base 指向 web 根，使 task-panel.js 内相对路径（css/、modules/）正确解析；
         绝对路径 /modules/tasks/assets/... 需从 launcher/web 作为站点根 serve（见 tools/run-tasks-harness.js）。 -->
    <base href="../../../">
    <!-- 预注入 task_panel.css 并带 id：task-panel.js 检测到已存在则跳过自注入 -->
    <link rel="stylesheet" id="task-panel-css" href="css/task_panel.css">
    <style>
        html, body { margin: 0; padding: 0; background: #0b0c10; color: #ccc;
            font-family: "Consolas", "Microsoft YaHei", monospace; }
        #bar { padding: 8px 12px; background: #1c1d22; border-bottom: 1px solid #333;
            display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
        #bar label { font-size: 12px; color: #999; }
        #bar select, #bar button {
            background: #2a2c33; color: #ccc; border: 1px solid #4a4d55;
            padding: 4px 10px; font-family: inherit; cursor: pointer; font-size: 12px; }
        #bar button:hover { background: #353841; }
        #status { padding: 4px 12px; font-size: 11px; color: #777; background: #0f1014;
            border-bottom: 1px solid #222; min-height: 16px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        #shell { margin: 24px auto; border: 1px solid #333; background: #000;
            position: relative; overflow: hidden; width: 1280px; height: 720px; }

        /* tooltip 极简皮（生产由 panels.css 的 .flash-tt-* 提供，harness 自带最小观感） */
        #panel-tooltip { font-family: "Microsoft YaHei", sans-serif; }
        .flash-tt-rich { display: flex; gap: 8px; align-items: flex-start; }
        .flash-tt-rich--merge { display: block; }
        .flash-tt-intro-panel { display: flex; gap: 6px; align-items: flex-start; }
        .flash-tt-icon img { width: 46px; height: 46px; object-fit: contain; display: block; }
        .flash-tt-intro { font-size: 12px; line-height: 1.55; }
        .flash-tt-desc { font-size: 12px; line-height: 1.55; padding: 0 2px 0 8px;
            border-left: 1px solid rgba(239,148,66,0.4); }
    </style>
</head>
<body>
    <div id="bar">
        <label>视口:</label>
        <select id="vp">
            <option value="1024x576">1024×576 (1:1)</option>
            <option value="1280x720" selected>1280×720</option>
            <option value="1600x900">1600×900</option>
            <option value="1920x1080">1920×1080</option>
            <option value="900x560">900×560 (缩小)</option>
        </select>
        <label><input type="checkbox" id="empty"> 空列表</label>
        <button id="open">打开</button>
        <button id="close">关闭</button>
        <button id="dump">Dump</button>
    </div>
    <div id="status">就绪</div>
    <div id="shell">
        <div id="panel-container" style="display:none">
            <div id="panel-backdrop"></div>
            <div id="panel-content"></div>
        </div>
    </div>

    <div id="panel-tooltip" style="display:none;position:fixed;z-index:9999;pointer-events:none;
        max-width:360px;padding:6px 10px;font-size:12px;line-height:1.5;color:#f1d9b8;
        background:rgba(20,16,12,0.96);border:1px solid rgba(239,148,66,0.55);border-radius:3px;
        box-shadow:0 4px 18px rgba(0,0,0,0.6);"></div>

    <!-- chrome.webview mock，必须在 bridge.js 之前 -->
    <script>
    (function() {
        var listeners = [];
        window.chrome = window.chrome || {};
        window.chrome.webview = {
            addEventListener: function(type, h) { if (type === 'message') listeners.push(h); },
            postMessage: function(m) { if (window.TaskHost && window.TaskHost.handle) window.TaskHost.handle(m); },
            __dispatch: function(data) { var ev = { data: data }; listeners.forEach(function(l) { l(ev); }); }
        };
    })();
    </script>

    <script src="modules/bridge.js"></script>
    <script src="modules/panels.js"></script>
    <script src="modules/tooltip.js"></script>
    <script src="modules/icons.js"></script>
    <script src="modules/tasks/achievement-tab.js"></script>
    <script src="modules/tasks/task-panel.js"></script>

    <script>
    (function() {
        'use strict';
        if (typeof Panels.init === 'function') Panels.init();
        if (typeof PanelTooltip !== 'undefined' && PanelTooltip.getElement && !PanelTooltip.getElement()) {
            // tooltip.js init 在 load 前可能已跑；确保拿到元素
        }

        var status = document.getElementById('status');
        function log(m) { status.textContent = m; }
        function clone(o) { return JSON.parse(JSON.stringify(o)); }
        function q(name) { return (location.search.match(new RegExp('[?&]' + name + '=([^&]+)')) || [])[1]; }

        // ── mock 任务数据：覆盖五类 + 满足/未满足 + stage/item/npc/reward 多样 ──
        function makeTasks() {
            return [
                t(101, '斩杀大boss僵尸', '主线', 'Andy Law', true),
                t(102, '初入战场',       '主线', '指挥官',   false),
                t(103, '收集物资',       '支线', '补给官',   false),
                t(104, '选修课程',       '大学', '冯教授',   true),
                t(105, '弹药运输',       '后勤', '后勤官',   true),
                t(106, '通缉：赤色之手', '委托', '赏金中介', false),
                t(107, '极限生存',       '挑战', '挑战官',   true),
                t(108, '净化异形巢穴',   '异形', '研究员',   false),
                t(109, '敌后侦察',       '情报', '情报员',   false),
                t(110, '隐藏的惊喜',     '彩蛋', '神秘人',   false)
            ];
        }
        function t(id, title, type, npc, satisfied) {
            return { taskId: id, title: title, type: type, npcName: npc, satisfied: satisfied };
        }

        // detail by taskId
        var DETAILS = {
            101: d(101, '斩杀大boss僵尸', '主线', '斩杀修罗难度的大boss僵尸，为兵团扫清前进障碍。', stage('大boss僵尸', '修罗'), null, 'Andy Law', [rw('金币', 5000), rw('经验书', 2), rw('强化核心', 1)], false, true),
            102: d(102, '初入战场', '主线', '前往前线营地，与指挥官对话并熟悉基础操作。', stage('前线营地', '简单'), null, '指挥官', [rw('金币', 500), rw('绷带', 5)]),
            103: d(103, '收集物资', '支线', '为补给站收集急需的医疗与能量物资。', null, items('submit', [it('绷带', 3), it('能量饮料', 2), it('止血针', 1)]), '补给官', [rw('金币', 1200)]),
            104: d(104, '选修课程', '大学', '在军事学院完成一门选修课程的结业考核。', stage('军事学院', '冒险'), null, '冯教授', [rw('学分', 10), rw('经验书', 1)], true),
            105: d(105, '弹药运输', '后勤', '确保随身携带足量弹药箱以通过后勤检查。', null, items('contain', [it('弹药箱', 5)]), '后勤官', [rw('金币', 800)]),
            106: d(106, '通缉：赤色之手', '委托', '赏金委托：讨伐通缉目标「赤色之手」，将其首级带回作为凭证。委托可随时放弃。', stage('废弃工厂', '地狱'), items('submit', [it('赤色之手首级', 1)]), '赏金中介', [rw('金币', 30000), rw('K点', 50)]),
            107: d(107, '极限生存', '挑战', '在生存竞技场地狱难度下坚持到最后一波。', stage('生存竞技场', '地狱'), null, '挑战官', [rw('挑战徽章', 1), rw('金币', 8000)], true),
            108: d(108, '净化异形巢穴', '异形', '潜入异形巢穴，清除核心区域的所有威胁。', stage('异形巢穴', '修罗'), null, '研究员', [rw('异形组织', 3)]),
            109: d(109, '敌后侦察', '情报', '在敌后区域收集情报文件并安全撤离。', null, items('contain', [it('情报文件', 2)]), '情报员', [rw('情报点', 20)]),
            110: d(110, '隐藏的惊喜', '彩蛋', '寻找隐藏在地图角落的彩蛋奖励。', null, null, '神秘人', [rw('彩蛋礼盒', 1)]),
            // 未接取(locked)节点：不在 _treeActive/_treeFinished/makeTasks 中。验证图表防剧透——
            // 不进图、详情被遮罩，标题/描述/奖励绝不泄露（task-ui39）。
            111: d(111, '【剧透】终章·真相', '彩蛋', '【不应泄露的未接取描述】隐藏剧情后续。', stage('密室', '地狱'), null, '神秘人', [rw('传说装备', 1)])
        };
        function d(id, title, type, desc, stageReq, itemReqs, npc, rewards, finishRemote, finishNavigable) {
            return { taskId: id, type: type, title: title, description: desc, stageReq: stageReq, itemReqs: itemReqs, npcName: npc, rewards: rewards, finishRemote: finishRemote === true, finishNavigable: finishNavigable === true };
        }
        // 共享判定条件（conditions）mock：镜像 AS2 conditionsProgress 回包形状 {label,cur,target}。
        // 101 两条（一条进行中一条已达成）→ task-ui41 验证进度行渲染与 done 态。
        DETAILS[101].conditions = [
            { label: '击杀敌人（接取后）', cur: 18, target: 50 },
            { label: '商城花费K点', cur: 200, target: 200 }
        ];
        function stage(name, diff) { return { name: name, difficulty: diff }; }
        function items(kind, arr) { for (var i = 0; i < arr.length; i++) arr[i].kind = kind; return arr; }
        function it(name, count) { return { name: name, count: count, kind: 'submit' }; }
        function rw(name, count) { return { name: name, count: count }; }

        // mock 物品注释
        function tooltipFor(name) {
            var longDesc = (name === '强化核心' || name === '赤色之手首级' || name === '弹药箱');
            return {
                introHTML: "<b>" + name + "</b><br><font color='#ffcc00' size='12'>类型：任务物品</font>",
                descHTML: longDesc
                    ? "<font color='#cccccc'>" + name + "：一件关键的任务道具。它承载着这次行动的全部意义——从废墟深处取回，沿途经历了无数次交火与撤退。妥善保管，切勿在交付前丢失或出售。</font>"
                    : "<font color='#cccccc'>" + name + " 的简要注释。</font>",
                type: '消耗品',
                displayname: name
            };
        }

        // ── 事件日志/任务树（WS6）mock 静态目录（镜像 build 派生 task-catalog.json）──
        // 对话存在标志 [hasGetConv, hasFinishConv]；105 两者皆无 → 详情不显示重播按钮（QA 验证）
        var CONV_FLAGS = {
            101: [true, true], 102: [true, false], 103: [true, true], 104: [false, true],
            105: [false, false], 106: [true, true], 107: [true, false], 108: [true, true],
            109: [true, true], 110: [true, true], 111: [true, true]
        };
        var CHAIN_SEQ = { '主线': [[101, 1], [102, 2]], '支线': [[103, 1]], '大学': [[104, 1]], '后勤': [[105, 1]], '挑战': [[107, 1]], '异形': [[108, 1]], '情报': [[109, 1]], '彩蛋': [[110, 1], [111, 2]] };
        var CHAIN_UNSEQ = { '委托': [106] };
        // 前置依赖（图表边）：主线 101→102 脊柱；侧链挂在主线里程碑（跨链边）；110 无前置；106 委托不入图；111 未接取(locked)
        var REQ = { 101: [], 102: [101], 103: [101], 104: [102], 105: [101], 107: [102], 108: [102], 109: [101], 110: [], 106: [], 111: [110] };
        function buildCatalog() {
            var tasks = {};
            for (var id in DETAILS) {
                var dd = DETAILS[id], cf = CONV_FLAGS[id] || [false, false];
                tasks[String(id)] = {
                    id: Number(id), chain: [dd.type, null], type: dd.type, title: dd.title,
                    description: dd.description, npcName: dd.npcName, stageReq: dd.stageReq,
                    itemReqs: dd.itemReqs, rewards: dd.rewards, req: (REQ[id] || []),
                    hasGetConv: cf[0], hasFinishConv: cf[1]
                };
            }
            var chains = {};
            for (var cn in CHAIN_SEQ) {
                var arr = CHAIN_SEQ[cn].slice().sort(function(a, b) { return a[1] - b[1]; });
                chains[cn] = arr.map(function(x) { return x[0]; });
                for (var k = 0; k < arr.length; k++) { var tk = tasks[String(arr[k][0])]; if (tk) tk.chain = [cn, arr[k][1]]; }
            }
            return { version: 1, taskCount: Object.keys(tasks).length, tasks: tasks, chains: chains, chainsUnsequenced: CHAIN_UNSEQ };
        }
        window.__TASK_CATALOG = buildCatalog();

        // ── 成就 tab mock 静态目录（镜像 build 派生 achievement-catalog.json：hidden 条目已脱敏，
        //    title/description="???"、rewards=[]、objective 无 params——明文仅经 hiddenReveals 回传）──
        function achDef(id, cat, seq, title, desc, hidden, rewards, type, target) {
            return { id: id, category: [cat, seq], title: title, description: desc, hidden: !!hidden,
                rewards: rewards || [], claimMode: 'remote',
                objective: hidden ? { type: type, target: target } : { type: type, params: {}, target: target } };
        }
        window.__ACHIEVEMENT_CATALOG = {
            version: 1, achievementCount: 6,
            achievements: {
                '700101': achDef(700101, '基建', 1, '破土动工', '建成你的第一处基建设施', false, [rw('金币', 5000)], 'infraBuiltCount', 1),
                '700201': achDef(700201, '击杀', 1, '百人斩', '成就启用后累计击杀 100 名敌人', false, [rw('金币', 10000)], 'killTotal', 100),
                '700202': achDef(700202, '击杀', 2, '十人斩', '成就启用后累计击杀 10 名敌人', false, [rw('金币', 2000)], 'killTotal', 10),
                '700204': achDef(700204, '击杀', 4, '???', '???', true, [], 'killTotal', 5000),
                '700301': achDef(700301, '任务', 1, '初来乍到', '完成你的第一个主线任务', false, [rw('金币', 1000)], 'taskFinished', 1),
                '700502': achDef(700502, '物品', 2, '???', '???', true, [], 'itemOwned', 1)
            },
            categories: { '基建': [700101], '击杀': [700201, 700202, 700204], '任务': [700301], '物品': [700502] }
        };

        var host = window.TaskHost = {
            _tasks: [],
            _empty: false,
            // 进度叠加 mock（taskTreeState 回包）：active=进行中, finished=已完成
            _treeActive: [101, 103, 104, 106, 109],
            _treeFinished: ['102', '105', '107', '108', '110'],
            _treeProgress: { '主线': 2, '大学': 1, '后勤': 1 },
            _detailCalls: 0,
            _inventoryFullFor: null,   // 模拟 FinishTask「背包无法装下奖励」失败的 taskId
            _respDelay: 50,            // 回包延迟(ms)，写操作在途竞态测试可调大
            _navOverride: {},          // taskId→Boolean 覆盖 detail.finishNavigable（模拟注册表迟到/区域解锁变化）
            // satisfied 覆盖表：模拟 AS2 taskCompleteCheck 的判定结果随游戏状态变化（如补齐提交物品）。
            // Web 端只消费此布尔，不自行从 stageReq/itemReqs 推断完成——本表用于验证该契约。
            _satisfiedOverride: {},
            // 成就 mock 状态（镜像 AS2 AchievementService）：unlocked/claimed/progress/hiddenReveals
            _achUnlocked: [],
            _achClaimed: [],
            _achProgress: {},
            _achReveals: [],
            _achNotReady: false,
            _achInventoryFullFor: null,
            reset: function() {
                this._empty = document.getElementById('empty').checked;
                this._tasks = this._empty ? [] : makeTasks();
                for (var i = 0; i < this._tasks.length; i++) {
                    var ov = this._satisfiedOverride[this._tasks[i].taskId];
                    if (ov !== undefined) this._tasks[i].satisfied = ov;
                }
                // 成就基线：700101 可领取 / 700301 已领取 / 700201 进行中 37/100 /
                // 700202 cur(99)>target(10)=UI 封顶专项 / 700204 hidden 未解锁 / 700502 hidden 已解锁(走 reveals)
                this._achUnlocked = ['700101', '700502'];
                this._achClaimed = ['700301'];
                this._achProgress = { '700101': 1, '700201': 37, '700202': 99 };
                this._achReveals = [{ id: 700502, title: '锋芒内敛', description: '持有名刀「镜之虎彻」', rewards: [{ name: 'K点', count: 200 }] }];
                this._achNotReady = false;
                this._achInventoryFullFor = null;
            },
            achRevealFor: function(aid) {
                for (var i = 0; i < this._achReveals.length; i++) {
                    if (String(this._achReveals[i].id) === String(aid)) return this._achReveals[i];
                }
                return null;
            },
            // 完整状态叠加（state 与 claim 回包共用——镜像 AS2 buildStateOverlay 单一口径）
            achOverlay: function(extra) {
                var unl = this._achUnlocked.slice();
                for (var i = 0; i < this._achClaimed.length; i++) {
                    if (unl.indexOf(this._achClaimed[i]) < 0) unl.push(this._achClaimed[i]);  // claimed ⊆ unlocked 不变量
                }
                extra.unlocked = unl;
                extra.claimed = this._achClaimed.slice();
                extra.progress = clone(this._achProgress);
                extra.hiddenReveals = clone(this._achReveals);
                extra.dataReady = true;
                return extra;
            },
            setSatisfied: function(taskId, val) {
                this._satisfiedOverride[taskId] = val;
                for (var i = 0; i < this._tasks.length; i++) if (this._tasks[i].taskId === taskId) this._tasks[i].satisfied = val;
            },
            // 按 taskId 解析当前 index（镜像 AS2 resolveIndexByTaskId：splice 后 index 偏移，taskId 才稳定）
            findIdx: function(taskId) {
                for (var i = 0; i < this._tasks.length; i++) if (String(this._tasks[i].taskId) === String(taskId)) return i;
                return -1;
            },
            handle: function(m) {
                log('→ ' + m.cmd + (m.index != null ? ' index=' + m.index : '') + (m.taskId != null ? ' taskId=' + m.taskId : '') + (m.itemName ? ' ' + m.itemName : ''));
                if (m.cmd === 'detail') this._detailCalls++;
                var self = this;
                function resp(extra) {
                    var r = { type: 'panel_resp', panel: 'tasks', cmd: m.cmd, callId: m.callId };
                    for (var k in extra) r[k] = extra[k];
                    setTimeout(function() { chrome.webview.__dispatch(r); }, self._respDelay || 50);
                }
                switch (m.cmd) {
                    case 'snapshot':
                        resp({ success: true, tasks: clone(self._tasks) });
                        break;
                    case 'detail': {
                        var task = self._tasks[m.index];
                        if (!task) { resp({ success: false, error: 'invalid_index' }); break; }
                        var dd = clone(DETAILS[task.taskId]);
                        // 动态可达性覆盖（镜像 AS2 按当前游戏态实时算 finishNavigable）
                        if (self._navOverride[task.taskId] !== undefined) dd.finishNavigable = self._navOverride[task.taskId];
                        // 运行态完成判定（镜像 AS2 handleDetail 实时回 taskCompleteCheck，与 snapshot 同源）
                        dd.satisfied = (task.satisfied === true);
                        resp({ success: true, taskData: dd });
                        break;
                    }
                    case 'tooltip': {
                        var tt = tooltipFor(m.itemName);
                        resp({ success: true, introHTML: tt.introHTML, descHTML: tt.descHTML, itemType: tt.type });
                        break;
                    }
                    // 写操作：镜像 AS2 handleFinish/handleDelete（taskId 解析 + 门控 + splice + 回刷新 tasks）
                    case 'finishTask': {
                        var fi = self.findIdx(m.taskId);
                        if (fi < 0) { resp({ success: false, error: 'task_not_found', tasks: clone(self._tasks) }); break; }
                        // 镜像 AS2 handleFinish 门控顺序：远程开关在完成度之前。非远程任务一律 requires_npc，
                        // 即便客户端绕过禁用按钮直发也拒绝（服务端硬门控的 harness 等价物）。
                        var fd = DETAILS[self._tasks[fi].taskId];
                        if (!(fd && fd.finishRemote === true)) { resp({ success: false, error: 'requires_npc', tasks: clone(self._tasks) }); break; }
                        if (!self._tasks[fi].satisfied) { resp({ success: false, error: 'not_satisfied', tasks: clone(self._tasks) }); break; }
                        if (self._inventoryFullFor != null && String(self._tasks[fi].taskId) === String(self._inventoryFullFor)) {
                            resp({ success: false, error: 'inventory_full', tasks: clone(self._tasks) }); break;
                        }
                        self._tasks.splice(fi, 1);
                        resp({ success: true, tasks: clone(self._tasks) });
                        break;
                    }
                    case 'deleteTask': {
                        var di = self.findIdx(m.taskId);
                        if (di < 0) { resp({ success: false, error: 'task_not_found', tasks: clone(self._tasks) }); break; }
                        if (self._tasks[di].type === '主线') { resp({ success: false, error: 'cannot_delete_main', tasks: clone(self._tasks) }); break; }
                        self._tasks.splice(di, 1);
                        resp({ success: true, tasks: clone(self._tasks) });
                        break;
                    }
                    // 前往交付：镜像 AS2 handleNavigateFinish——按 DETAILS.finishNavigable 判可达，成功回 closePanel
                    case 'navigateFinish': {
                        var gi = self.findIdx(m.taskId);
                        if (gi < 0) { resp({ success: false, error: 'task_not_found' }); break; }
                        var gd = DETAILS[self._tasks[gi].taskId];
                        if (gd && gd.finishNavigable === true) { resp({ success: true, closePanel: true }); }
                        else { resp({ success: false, error: 'not_navigable' }); }
                        break;
                    }
                    // WS6 进度小叠加（只读存档态）
                    case 'treeState':
                        resp({ success: true, chainsProgress: clone(self._treeProgress), finished: self._treeFinished.slice(), active: self._treeActive.slice() });
                        break;
                    // WS6 对话回放：镜像 AS2 handleReplayDialogue——防剧透门控 + hasConv 判定，回传对话文本行
                    case 'replayDialogue': {
                        var rt = window.__TASK_CATALOG.tasks[String(m.taskId)];
                        if (!rt) { resp({ success: false, error: 'task_not_found' }); break; }
                        // 防剧透硬门控（镜像 AS2，服务端权威）：接取对话需 active||finished；完成对话需 finished。
                        var rid = String(m.taskId);
                        var rFin = self._treeFinished.indexOf(rid) >= 0 || self._treeFinished.indexOf(Number(rid)) >= 0;
                        var rAct = self._treeActive.indexOf(Number(rid)) >= 0 || self._treeActive.indexOf(rid) >= 0;
                        var rAllowed = (m.which === 'finish') ? rFin : (rAct || rFin);
                        if (!rAllowed) { resp({ success: false, error: 'locked' }); break; }
                        var has = (m.which === 'finish' ? rt.hasFinishConv : rt.hasGetConv);
                        if (!has) { resp({ success: false, error: 'no_dialogue' }); break; }
                        var label = (m.which === 'finish') ? '完成' : '接取';
                        // 镜像真机：玩家行 name=fs + title 为 $PC_TITLE 解析出的 AS2 htmlText 动态称号 + 正文含 <B>
                        resp({ success: true, which: m.which, lines: [
                            { speaker: rt.npcName || 'NPC', sub: '前情报员', text: '【' + label + '·' + (rt.title || '') + '】模拟对话第一句。' },
                            { speaker: 'fs', sub: "<FONT COLOR='#FFCC00'>血量很多</FONT>", text: '玩家回应，<B>强调</B>一下。' }
                        ] });
                        break;
                    }
                    // 成就：状态叠加（只读）+ 领取（门控链镜像 AS2 handleClaim）
                    case 'achievementState':
                        if (self._achNotReady) { resp({ success: false, error: 'not_ready', dataReady: true }); break; }
                        resp(self.achOverlay({ success: true }));
                        break;
                    case 'achievementClaim': {
                        if (self._achNotReady) { resp({ success: false, error: 'not_ready' }); break; }
                        var aid = String(m.achievementId);
                        var adef = window.__ACHIEVEMENT_CATALOG.achievements[aid];
                        if (!adef) { resp(self.achOverlay({ success: false, error: 'achievement_not_found' })); break; }
                        if (self._achClaimed.indexOf(aid) >= 0) { resp(self.achOverlay({ success: false, error: 'already_claimed' })); break; }
                        var aunl = self._achUnlocked.indexOf(aid) >= 0;
                        if (!aunl) { resp(self.achOverlay({ success: false, error: 'not_unlocked' })); break; }
                        if (self._achInventoryFullFor != null && aid === String(self._achInventoryFullFor)) {
                            // 背包满：不置 claimed（保持 unlocked 可重试，镜像 AS2 acquire false 分支）
                            resp({ success: false, error: 'inventory_full' }); break;
                        }
                        self._achClaimed.push(aid);
                        var arv = adef.hidden ? self.achRevealFor(aid) : null;
                        var arws = adef.hidden ? (arv ? arv.rewards : []) : adef.rewards;
                        resp(self.achOverlay({ success: true, rewards: clone(arws) }));
                        break;
                    }
                    case 'close': break;
                    default: resp({ success: false, error: 'unknown cmd ' + m.cmd });
                }
            },

                (function poll() {

                    try { v = cond(); } catch (e) { v = false; }
                    if (v) return resolve(v);
                    if (Date.now() - t0 > (timeout || 4000)) return reject(new Error('waitFor timeout'));
                    setTimeout(poll, 40);
                })();
            });
        }

                var visible = getComputedStyle(document.getElementById('task-panel-achview')).display !== 'none';
                return visible && achState().rowCount === 6 &&
                    document.querySelectorAll('#ach-list .ach-section').length === 4;
            });

            await check('ach-ui2', '成就目录就绪且含 version/achievementCount', function() {
                var cat = window.__ACHIEVEMENT_CATALOG;
                return achState().catalogState === 'ready' && cat.version === 1 && cat.achievementCount === 6;
            });

            await check('ach-ui3', '四态徽章齐全：locked/inProgress/unlocked/claimed 各至少一条', function() {
                return !!document.querySelector('.ach-row.state-locked') &&
                       !!document.querySelector('.ach-row.state-progress') &&
                       !!document.querySelector('.ach-row.state-unlocked') &&
                       !!document.querySelector('.ach-row.state-claimed');
            });

            await check('ach-ui4', '进度封顶：cur(99)>target(10) 显 10/10 + 100%，不出现 NaN/null', function() {
                var row = document.querySelector('.ach-row[data-ach-id="700202"]');
                var fill = row.querySelector('.ach-progress-fill');
                var txt = row.querySelector('.ach-progress-text').textContent;
                return txt === '10/10' && fill.style.width === '100%' &&
                    row.innerHTML.indexOf('NaN') < 0 && row.innerHTML.indexOf('null') < 0;
            });

            await check('ach-ui5', 'hidden 双层：未解锁显"???"无进度条；已解锁经 hiddenReveals 显明文+奖励；catalog 源头脱敏', function() {
                var lockedRow = document.querySelector('.ach-row[data-ach-id="700204"]');
                var lockedOk = lockedRow.textContent.indexOf('???') >= 0 && !lockedRow.querySelector('.ach-progress');
                var revealRow = document.querySelector('.ach-row[data-ach-id="700502"]');
                var revealOk = revealRow.textContent.indexOf('锋芒内敛') >= 0 &&
                    revealRow.textContent.indexOf('???') < 0 &&
                    !!revealRow.querySelector('.task-item[data-item-name="K点"]');
                var catClean = window.__ACHIEVEMENT_CATALOG.achievements['700502'].title === '???' &&
                    (window.__ACHIEVEMENT_CATALOG.achievements['700502'].rewards || []).length === 0;
                return lockedOk && revealOk && catClean;
            });

            await check('ach-ui6', 'claim 成功：行变 claimed（按钮消失+灰勾）+ 面板内奖励 toast', async function() {
                var btn = document.querySelector('.ach-row[data-ach-id="700101"] .ach-claim-btn');
                btn.click();
                await waitFor(function() {
                    var row = document.querySelector('.ach-row[data-ach-id="700101"]');
                    return row && row.classList.contains('state-claimed');
                }, 3000);
                var row = document.querySelector('.ach-row[data-ach-id="700101"]');
                var toastEl = document.querySelector('.ach-toast');
                return !row.querySelector('.ach-claim-btn') && !!row.querySelector('.ach-claimed-mark') &&
                    toastEl && toastEl.textContent.indexOf('金币') >= 0;
            });

            await check('ach-ui7', 'inventory_full：领取失败保持 unlocked 可重试，清障后重试成功', async function() {
                await reopenFresh();
                host._achInventoryFullFor = 700101;
                await enterAch();
                document.querySelector('.ach-row[data-ach-id="700101"] .ach-claim-btn').click();
                await waitFor(function() { return !window.TaskPanel._isBusy(); }, 3000);
                var stillClaimable = !!document.querySelector('.ach-row[data-ach-id="700101"] .ach-claim-btn');
                host._achInventoryFullFor = null;
                document.querySelector('.ach-row[data-ach-id="700101"] .ach-claim-btn').click();
                await waitFor(function() {
                    var row = document.querySelector('.ach-row[data-ach-id="700101"]');
                    return row && row.classList.contains('state-claimed');
                }, 3000);
                return stillClaimable;
            });

            await check('ach-ui8', 'already_claimed 幂等：绕过 UI 直发已领取条目→回包幂等错误码，UI 仍 claimed 不抖', async function() {
                var resp = await new Promise(function(resolve) {
                    window.TaskPanel._debugSend('achievementClaim', { achievementId: 700301 }, resolve);
                });
                var row = document.querySelector('.ach-row[data-ach-id="700301"]');
                return resp.success === false && resp.error === 'already_claimed' &&
                    row.classList.contains('state-claimed');
            });

            await check('ach-ui9', '重开面板无残留：动态状态重置重拉（catalog 缓存保留不重 fetch）', async function() {
                await reopenFresh();
                var cleared = !achState().stateLoaded && achState().rowCount === 0;
                await enterAch();
                return cleared && achState().stateLoaded && achState().rowCount === 6 &&
                    achState().catalogState === 'ready';
            });

            await check('ach-ui10', '_busy 锁：claim 在途拦 切tab + 二次点击，回包后解锁且只领取一次', async function() {
                await reopenFresh();
                host._respDelay = 400;
                await enterAch();
                var btn = document.querySelector('.ach-row[data-ach-id="700101"] .ach-claim-btn');
                btn.click();
                var busyDuring = window.TaskPanel._isBusy();
                clickTab('mine');   // 在途切 tab 应被拦截
                var stillAch = window.TaskPanel.getState().tab === 'ach';
                btn.click();        // 二次点击应被拦截
                await waitFor(function() { return !window.TaskPanel._isBusy(); }, 3000);
                host._respDelay = 50;
                var row = document.querySelector('.ach-row[data-ach-id="700101"]');
                return busyDuring && stillAch && row.classList.contains('state-claimed');
            });

            await check('ach-ui11', '回包分流：achievementState 与任务 snapshot 并发互不串扰（callId 各回各家）', async function() {
                await reopenFresh();
                var both = await Promise.all([
                    new Promise(function(resolve) { window.TaskPanel._debugSend('achievementState', null, resolve); }),
                    new Promise(function(resolve) { window.TaskPanel._debugSend('snapshot', null, resolve); })
                ]);
                return both[0].unlocked !== undefined && both[0].tasks === undefined &&
                       both[1].tasks !== undefined && both[1].unlocked === undefined;
            });

            await check('ach-ui12', 'catalog 加载失败：降级文案「成就数据未加载」', async function() {
                await reopenFresh();
                window.__ACH_FORCE_CATALOG_ERROR = true;
                clickTab('ach');
                await waitFor(function() { return document.querySelector('#ach-list .ach-error'); }, 3000);
                var txt = document.getElementById('ach-list').textContent;
                window.__ACH_FORCE_CATALOG_ERROR = false;
                return txt.indexOf('成就数据未加载') >= 0;
            });

            await check('ach-ui13', 'not_ready：降级文案「存档尚未就绪」+ _busy 解除，就绪后重进恢复', async function() {
                await reopenFresh();
                host._achNotReady = true;
                await enterAch();
                var degraded = document.getElementById('ach-list').textContent.indexOf('存档尚未就绪') >= 0 &&
                    !window.TaskPanel._isBusy();
                host._achNotReady = false;
                clickTab('mine');
                clickTab('ach');
                await waitFor(function() { return achState().rowCount === 6; }, 3000);
                return degraded;
            });

            await check('task-ui41', '共享判定条件：详情渲染 conditions 进度行(label+cur/target+进度条)，达成行带 done 态', async function() {
                await reopenFresh();
                clickIcon(0); // 101 主线（mock detail 带 2 条 conditions）
                await waitFor(function() { return document.querySelectorAll('.task-cond-row').length === 2; }, 3000);
                var rows = document.querySelectorAll('.task-cond-row');
                var row0Ok = rows[0].querySelector('.task-cond-label').textContent === '击杀敌人（接取后）' &&
                    rows[0].querySelector('.task-cond-count').textContent === '18/50' &&
                    !rows[0].classList.contains('done');
                var row1Ok = rows[1].querySelector('.task-cond-count').textContent === '200/200' &&
                    rows[1].classList.contains('done');
                var fillW = rows[0].querySelector('.task-cond-fill').style.width === '36%';
                // 无 conditions 的任务不渲染该区块
                clickIcon(1); // 102
                await waitFor(function() { return document.querySelector('.task-title-line2') && document.querySelector('.task-title-line2').textContent === '初入战场'; }, 3000);
                var none = document.querySelectorAll('.task-cond-row').length === 0;
                return row0Ok && row1Ok && fillW && none;
            });

            await check('task-ui42', '条件进度不被缓存固化：读数推进后重选任务→后台复查→进度行就地刷新（含 done 态翻转）', async function() {
                await reopenFresh();
                clickIcon(0); // 101 首次加载（fresh detail，conditions 18/50 进缓存）
                await waitFor(function() { return document.querySelectorAll('.task-cond-row').length === 2; }, 3000);
                // 模拟游戏侧条件推进（AS2 rawOf 读数变化）：mock 源数据前进到 50/50
                var origCur = DETAILS[101].conditions[0].cur;
                DETAILS[101].conditions[0].cur = 50;
                try {
                    clickIcon(1); // 切走
                    await waitFor(function() { return titleNow() === '初入战场'; }, 3000);
                    var c1 = host._detailCalls;
                    clickIcon(0); // 切回 → 缓存命中（先渲染旧 18/50）→ 后台复查 → 就地修补为 50/50
                    await waitFor(function() {
                        var row = document.querySelector('.task-cond-row');
                        return row && row.querySelector('.task-cond-count').textContent === '50/50';
                    }, 3000);
                    var row0 = document.querySelector('.task-cond-row');
                    var doneOk = row0.classList.contains('done') &&
                        row0.querySelector('.task-cond-fill').style.width === '100%';
                    var refetched = host._detailCalls > c1; // 复查确实打了 detail（非纯缓存）
                    return doneOk && refetched;
                } finally {
                    DETAILS[101].conditions[0].cur = origCur; // 恢复 mock，防污染后续用例
                }
            });

            var passed = results.filter(function(r) { return r.pass; }).length;
            window.__qaResult = {
                qa: { passed: passed, total: results.length, failed: results.length - passed, results: results },
                logs: []
            };
            log('QA: ' + passed + '/' + results.length + ' passed');
        }

        if (q('qa')) {
            window.addEventListener('load', function() { setTimeout(runQa, 100); });
        } else {
            window.addEventListener('load', function() {
                setTimeout(function() { host.open(); setTimeout(applyShotState, 150); }, 100);
            });
        }
    })();
    </script>
</body>
</html>
