<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<base href="../../../">
<title>Dressup Panel Harness</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="css/overlay.css">
<link rel="stylesheet" href="css/panels.css">
<style>
html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    background: #080b10;
}
</style>
</head>
<body>
<div id="panel-container" style="display:none">
    <div id="panel-backdrop"></div>
    <div id="panel-content"></div>
</div>
<div id="panel-tooltip"></div>
<script src="modules/bridge.js"></script>
<script src="modules/lazy-loader.js"></script>
<script src="modules/panels.js"></script>
<script src="modules/asset-timeline.js"></script>
<script src="modules/panels-lazy-registry.js"></script>
<script>
(function() {
    'use strict';
    window.addEventListener('load', function() {
        var params = new URLSearchParams(window.location.search);
        var initData = {
            mode: 'dev',
            source: 'panel-harness',
            debug: true,
            sample: params.get('sample') || '',
            manifestUrl: params.get('manifest') || ''
        };
        var skinKey = params.get('skinKey') || '';
        if (skinKey) {
            var field = params.get('field') || '身体';
            initData.skinKey = skinKey;
            initData.keyMap = {};
            initData.keyMap[field] = skinKey;
        }
        if (params.get('gender')) initData.gender = params.get('gender');
        Panels.init();
        Panels.open('dressup', initData);
    });
})();
</script>
</body>
</html>
