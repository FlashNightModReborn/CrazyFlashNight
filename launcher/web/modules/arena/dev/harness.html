<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arena Panel Harness</title>
    <link rel="stylesheet" href="../../../css/panels.css">
    <link rel="stylesheet" href="../../minigames/shared/dev/harness-base.css">
    <style>
        /* harness 专属样式 */
        body {
            margin: 0;
            padding: 0;
            background: #1a1a1a;
            font-family: "Consolas", "Courier New", "Microsoft YaHei", monospace;
            color: #ccc;
        }
        #harness-toolbar {
            padding: 8px 12px;
            background: #252525;
            border-bottom: 1px solid #444;
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }
        #harness-toolbar label { font-size: 12px; color: #aaa; }
        #harness-toolbar select,
        #harness-toolbar button {
            background: #333;
            color: #ccc;
            border: 1px solid #555;
            padding: 4px 8px;
            font-family: inherit;
            cursor: pointer;
        }
        #harness-toolbar button:hover { background: #444; }
        #harness-status {
            padding: 4px 12px;
            background: #1a1a1a;
            border-bottom: 1px solid #333;
            font-size: 12px;
            color: #888;
            min-height: 18px;
        }
        #viewport-shell {
            margin: 20px auto;
            border: 2px solid #444;
            background: #000;
            position: relative;
            overflow: hidden;
            /* 默认 1024x576（Flash 设计分辨率） */
            width: 1024px;
            height: 576px;
        }
        /* QA 模式全屏 */
        body.arena-qa { overflow: hidden; }
        body.arena-qa #harness-toolbar,
        body.arena-qa #harness-status { display: none; }
        body.arena-qa #viewport-shell {
            margin: 0;
            border: 0;
            width: 100vw;
            height: 100vh;
        }
    </style>
</head>
<body>
    <div id="harness-toolbar">
        <label>视口:</label>
        <select id="viewport-select">
            <option value="1024x576">1024×576 (原始)</option>
            <option value="1024x720">1024×720 (launcher)</option>
            <option value="1366x768">1366×768</option>
            <option value="1600x900" selected>1600×900</option>
            <option value="1920x1080">1920×1080</option>
        </select>
        <label>金钱:</label>
        <select id="money-fixture">
            <option value="rich">富裕 (10,000,000)</option>
            <option value="normal" selected>正常 (5,717,348)</option>
            <option value="poor">贫穷 (1,000)</option>
            <option value="broke">破产 (0)</option>
        </select>
        <button id="btn-open" type="button">Open Panel</button>
        <button id="btn-close" type="button">Close Panel</button>
        <button id="btn-force-close" type="button">Force Close</button>
        <button id="btn-dump" type="button">Dump State</button>
    </div>
    <div id="harness-status">就绪</div>
    <div id="viewport-shell">
        <div id="panel-container" style="display:none">
            <div id="panel-backdrop"></div>
            <div id="panel-content"></div>
        </div>
    </div>

    <!-- chrome.webview mock 必须在 bridge.js 之前定义 -->
    <script>
    (function() {
        var listeners = [];
        window.chrome = window.chrome || {};
        window.chrome.webview = {
            addEventListener: function(type, handler) {
                if (type === 'message') listeners.push(handler);
            },
            postMessage: function(message) {
                if (window.ArenaHarnessHost) {
                    window.ArenaHarnessHost.sentMessages.push(message);
                    if (window.ArenaHarnessHost.handleMessage)
                        window.ArenaHarnessHost.handleMessage(message);
                }
            },
            __dispatch: function(data) {
                var event = { data: data };
                listeners.forEach(function(l) { l(event); });
            }
        };
    })();
    </script>

    <!-- 共享基础设施 -->
    <script src="../../bridge.js"></script>
    <script src="../../panels.js"></script>
    <script src="../../panel-scale.js"></script>
    <script src="../../tooltip.js"></script>
    <script src="../../icons.js"></script>
    <script src="../../minigames/shared/dev/harness-base.js"></script>

    <!-- PanelTooltip 容器（生产环境由 overlay.html 提供） -->
    <div id="panel-tooltip" style="display:none;position:fixed;background:#1a1a1a;border:1px solid #444;padding:8px;font-size:11px;color:#ddd;z-index:9999;pointer-events:none;border-radius:3px;"></div>

    <!-- 面板业务逻辑 -->
    <script src="../../arena-panel.js"></script>

    <!-- Harness 初始化 -->
    <script>
    (function() {
        'use strict';

        // ── 解析 URL query ──
        var query = {};
        var search = window.location.search;
        if (search) {
            var pairs = search.substring(1).split('&');
            for (var i = 0; i < pairs.length; i++) {
                var kv = pairs[i].split('=');
                if (kv.length === 2) query[decodeURIComponent(kv[0])] = decodeURIComponent(kv[1]);
            }
        }

        // ── QA 模式 CSS ──
        if (query.qa === '1' || query.case) {
            document.body.classList.add('arena-qa');
        }

        // ── Fixture 数据 ──
        var FIXTURES = {
            rich:   { money: 10000000, reuseCount: 0, reuseLimit: 2 },
            normal: { money: 5717348,  reuseCount: 1, reuseLimit: 2 },
            poor:   { money: 1000,     reuseCount: 2, reuseLimit: 4 },
            broke:  { money: 0,        reuseCount: 0, reuseLimit: 2 }
        };

        // ── Host 对象 ──
        var host = window.ArenaHarnessHost = {
            sentMessages: [],
            enterMessages: [],
            previewMessages: [],
            nextEnterError: '',
            // QA 用：单卡 preview 失败注入。{cardIdx → errString} — preview mock 命中即返失败，单次有效
            failNextPreviewByCardIdx: {},
            // mock 端按 cardIndex 缓存 lineup（供 QA 验"web 收到的回包确实带了 cardIndex" + "lineup 一致性"）
            _previewCache: {},
            _fixture: 'normal',

            setViewport: function(value) {
                var shell = document.getElementById('viewport-shell');
                if (!shell) return;
                if (value === 'fullscreen') {
                    shell.style.width = '100vw';
                    shell.style.height = '100vh';
                } else {
                    var wh = value.split('x');
                    shell.style.width = wh[0] + 'px';
                    shell.style.height = wh[1] + 'px';
                }
            },

            setFixture: function(name) {
                this._fixture = name;
            },

            getSnapshot: function() {
                var f = FIXTURES[this._fixture] || FIXTURES.normal;
                return {
                    money: f.money,
                    reuseCount: f.reuseCount,
                    reuseLimit: f.reuseLimit
                };
            },

            open: function(options) {
                chrome.webview.__dispatch({
                    type: 'panel_cmd',
                    cmd: 'open',
                    panel: 'arena',
                    initData: options || {}
                });
            },

            close: function() {
                chrome.webview.__dispatch({ type: 'panel_cmd', cmd: 'close' });
            },

            forceClose: function() {
                chrome.webview.__dispatch({ type: 'panel_cmd', cmd: 'force_close' });
            },

            // QA helper：让 next preview 命中此 cardIdx 时返回失败（模拟 stock_insufficient / network err）
            failNextPreviewForCard: function(cardIdx, errString) {
                this.failNextPreviewByCardIdx[cardIdx] = errString || 'stock_insufficient';
            },

            getPreviewCache: function() {
                return this._previewCache;
            },

            resetPreviewState: function() {
                this.previewMessages = [];
                this._previewCache = {};
                this.failNextPreviewByCardIdx = {};
            },

            handleMessage: function(message) {
                var status = document.getElementById('harness-status');
                if (status) status.textContent = '→ ' + JSON.stringify(message).substring(0, 200);

                if (message.cmd === 'snapshot') {
                    setTimeout(function() {
                        chrome.webview.__dispatch({
                            type: 'panel_resp',
                            panel: 'arena',
                            cmd: 'snapshot',
                            callId: message.callId,
                            success: true,
                            snapshot: host.getSnapshot()
                        });
                    }, 50);
                }
                else if (message.cmd === 'enter') {
                    host.enterMessages.push(message);
                    setTimeout(function() {
                        if (host.nextEnterError) {
                            chrome.webview.__dispatch({
                                type: 'panel_resp',
                                panel: 'arena',
                                cmd: 'enter',
                                callId: message.callId,
                                cardIndex: message.cardIndex,
                                success: false,
                                error: host.nextEnterError
                            });
                            host.nextEnterError = '';
                        } else {
                            chrome.webview.__dispatch({
                                type: 'panel_resp',
                                panel: 'arena',
                                cmd: 'enter',
                                callId: message.callId,
                                cardIndex: message.cardIndex,
                                success: true,
                                closePanel: true
                            });
                        }
                    }, 100);
                }
                else if (message.cmd === 'preview') {
                    host.previewMessages.push(message);
                    var cardIdx = message.cardIndex;
                    setTimeout(function() {
                        // 失败注入（QA case grid-single-fail-retry 用）：单次有效，回包后清掉
                        if (cardIdx !== undefined && host.failNextPreviewByCardIdx[cardIdx] !== undefined) {
                            var errString = host.failNextPreviewByCardIdx[cardIdx];
                            delete host.failNextPreviewByCardIdx[cardIdx];
                            chrome.webview.__dispatch({
                                type: 'panel_resp',
                                panel: 'arena',
                                cmd: 'preview',
                                callId: message.callId,
                                cardIndex: cardIdx,
                                success: false,
                                error: errString
                            });
                            return;
                        }
                        // 简化 fixture：根据 expr 解析等级范围 / 人数，生成 placeholder 对手数据
                        var m = String(message.expr || '').match(/@(\d+)-(\d+)%(\d+)/);
                        var lo = m ? Number(m[1]) : 1;
                        var hi = m ? Number(m[2]) : 10;
                        var count = m ? Number(m[3]) : 1;
                        var opponents = [];
                        for (var i = 0; i < count; i++) {
                            var lvl = lo + Math.floor((hi - lo) * (i + 1) / (count + 1));
                            var eLvl = Math.max(1, Math.floor(lvl/5));
                            // 名字带 cardIdx 让 QA 能验"摘要文本与回包数据一致"且区分卡片
                            var oppName = (cardIdx !== undefined ? 'C' + cardIdx + '-' : '') + 'Mock-' + (i + 1);
                            opponents.push({
                                name: oppName,
                                level: lvl,
                                equips: [
                                    { slot: 6,  raw: '铁盔',         name: '铁盔', icon: '铁盔', displayname: '铁盔',         level: eLvl },
                                    { slot: 8,  raw: '铁甲##二阶',    name: '铁甲', icon: '铁甲', displayname: '铁甲 二阶',     level: eLvl },
                                    { slot: 10, raw: '铁靴',         name: '铁靴', icon: '铁靴', displayname: '铁靴',         level: eLvl },
                                    { slot: 12, raw: 'M14',          name: 'M14',  icon: 'M14',  displayname: 'M14',          level: eLvl }
                                ]
                            });
                        }
                        if (cardIdx !== undefined) {
                            host._previewCache[cardIdx] = opponents;
                        }
                        chrome.webview.__dispatch({
                            type: 'panel_resp',
                            panel: 'arena',
                            cmd: 'preview',
                            callId: message.callId,
                            cardIndex: cardIdx,
                            success: true,
                            expr: message.expr,
                            opponents: opponents
                        });
                    }, 80);
                }
                else if (message.cmd === 'equip_tooltip') {
                    setTimeout(function() {
                        var raw = message.raw || message.name || '';
                        chrome.webview.__dispatch({
                            type: 'panel_resp',
                            panel: 'arena',
                            cmd: 'equip_tooltip',
                            callId: message.callId,
                            success: true,
                            itemName: raw,
                            displayname: raw + ' Lv.' + message.level,
                            descHTML: '基础属性: 攻击 +' + (message.level * 10),
                            introHTML: '<FONT COLOR=\'#FFCC00\'>强化 ' + message.level + ' 级</FONT>'
                        });
                    }, 50);
                }
                else if (message.cmd === 'close') {
                    // Web 通知 C# 关闭；harness 中无需回包
                }
            }
        };

        // ── Toolbar 绑定 ──
        document.getElementById('viewport-select').addEventListener('change', function(e) {
            host.setViewport(e.target.value);
        });
        document.getElementById('money-fixture').addEventListener('change', function(e) {
            host.setFixture(e.target.value);
            if (Panels.getActive && Panels.getActive() === 'arena') {
                // 若 panel 已打开，模拟推一条 snapshot 更新
                chrome.webview.__dispatch({
                    type: 'panel_resp',
                    panel: 'arena',
                    cmd: 'snapshot',
                    callId: 'harness_push_' + Date.now(),
                    success: true,
                    snapshot: host.getSnapshot()
                });
            }
        });
        document.getElementById('btn-open').addEventListener('click', function() { host.open(); });
        document.getElementById('btn-close').addEventListener('click', function() { host.close(); });
        document.getElementById('btn-force-close').addEventListener('click', function() { host.forceClose(); });
        document.getElementById('btn-dump').addEventListener('click', function() {
            var st = window.ArenaPanel ? window.ArenaPanel.getState() : null;
            console.log('[Harness Dump]', st);
            var status = document.getElementById('harness-status');
            if (status) status.textContent = 'Dump: ' + JSON.stringify(st);
        });

        // ── MinigameHarness 启动 ──
        var api = MinigameHarness.create({
            panelId: 'arena',
            title: 'Arena Panel QA',
            openPanel: function() {
                host.setFixture(document.getElementById('money-fixture').value);
                host.open();
            },
            runSuite: function(api, onlyCase) {
                return ArenaHarnessQA.runSuite(api, host, onlyCase);
            },
            collectDump: function() {
                return Promise.resolve(window.ArenaPanel ? window.ArenaPanel.getState() : null);
            }
        });

        // 自动 boot（加载 panel + 按需跑 QA）
        api.boot();

        // 若 URL 带 ?open=1 自动打开
        if (query.open === '1') {
            setTimeout(function() { host.open(); }, 200);
        }
    })();
    </script>

    <!-- QA Suite -->
    <script src="./qa-suite.js"></script>
</body>
</html>
