# CF7-Packer 打包配置
# 基于 2.71 整包精确分析得出的规则

version: 1
meta:
  name: "闪客快打7重置计划"

source:
  mode: worktree
  tag: null
  repoRoot: "../../"

output:
  dir: "./output/{version}"
  clean: true
  minify:
    enabled: true
    extensions: [ ".json", ".xml" ]

layers:
  - name: data
    description: "游戏数据（XML 配置）"
    source: "data/"
    include: [ "**/*" ]
    exclude: [ rag/*, task/agent_tasks.json, task/text/agent_text.json ]

  - name: scripts
    description: "运行时脚本（仅 asLoader，源码不打包）"
    source: "scripts/"
    include:
      - "asLoader.swf"
    exclude: []

  - name: flashswf
    description: "编译后的 SWF 与运行时资源（排除 XFL 源工程）"
    source: "flashswf/"
    include:
      - "**/*.swf"
      - "**/*.png"
      - "**/*.flv"
      - "**/*.html"
      - "portraits/**/*.xml"
    exclude:
      # 非运行时目录
      - "unused/**"
      - "miniGames/**"
      - "ComicTool/**"
      - "Langrage/**"
      # XFL 项目展开结构（LIBRARY/ 子目录中的 .png 等资源）
      - "**/LIBRARY/**"
      - "**/META-INF/**"
      # arts/ 下只保留 new/ 目录和根级 .swf
      - "arts/things0/**"
      - "arts/things1/**"
      - "arts/things2/**"
      - "arts/things3/**"
      - "arts/things4/**"
      - "arts/things5/**"
      - "arts/things切割/**"
      - "arts/renew/**"
      - "arts/原版素材库-子弹/**"
      - "arts/新版人物文字信息/**"
      - "arts/素材库-物品技能图标/**"
      # 其他排除
      - "**/*.fla"
      - "arts/原版素材库-子弹_横向拖尾联弹.swf"

  - name: sounds
    description: "音效 SWF + DOMDocument 元数据 + BGM 音乐"
    source: "sounds/"
    include:
      # 运行时音效（SWF 内嵌音频，DOMDocument 提供 linkageIdentifier 映射）
      - "*.swf"
      - "*/DOMDocument.xml"
      # BGM 配置与音乐文件
      - "bgm_list.xml"
      - "**/*.mp3"
    exclude: []

  - name: config
    description: "运行时配置"
    source: "config/"
    include: [ "**/*" ]
    exclude: []

  - name: root-files
    description: "根目录可执行文件、DLL 与配置"
    source: "."
    include:
      # Guardian 启动器 + 快捷键拦截辅助进程
      - "CRAZYFLASHER7MercenaryEmpire.exe"
      - "hotkey_guard.exe"
      # ClearScript V8 引擎（eval/regex task 依赖）
      - "ClearScript.Core.dll"
      - "ClearScript.V8.dll"
      - "ClearScript.V8.ICUData.dll"
      - "ClearScriptV8.win-x64.dll"
      # JSON 序列化
      - "Newtonsoft.Json.dll"
      # Flash Player + SWF
      - "CRAZYFLASHER7MercenaryEmpire.swf"
      - "Adobe Flash Player 20.exe"
      # 配置
      - "config.xml"
      - "config.toml"
      - "LICENSE"
      - "README.md"
    exclude: []

  - name: rapfi
    description: "Rapfi 五子棋引擎（GomokuTask 依赖）"
    source: "tools/rapfi/"
    include:
      - "pbrain-rapfi-windows-avx2.exe"
      - "config.toml"
      - "*.bin"
      - "*.bin.lz4"
    exclude: []

  - name: root-dirs
    description: "根目录文件夹（字体、教程）"
    source: "."
    include:
      - "闪7重置版字体/**"
      - "0.说明文件与教程/**"
      - fscommand/**
    exclude: []

globalExclude:
  - "**/.DS_Store"
  - "**/Thumbs.db"
  - "**/*.bak"

# 当前已支持打包工具内手动编辑

# music/ 不打包（音乐包独立外置），后续需要时加一个 layer 即可
# externalAssets（Unity 外壳）暂不支持，后续再加
