# CF7-Packer 打包配置
# 基线：2026-06-24 全层重新核对并调整（WebP 图标管线 / 子弹管线重构 / 新搓招 / 新地图 /
#   dressup 烘焙 / BGM 专辑直收 / Ruffle 运行时入包 / 开发脚本剔除 对齐）

version: 1
meta:
  name: "闪客快打7重置计划"

source:
  mode: worktree
  tag: null
  repoRoot: "../../"

output:
  # 每日包风格：按打包当日日期落目录（{date}=YYYY-MM-DD），同日重打会被 clean 覆盖
  # 占位符还支持 {timestamp}（精确到秒，保留多份）/ {version}（配置格式版本号，恒为上方 version）/ {tag} / {mode}
  dir: "./output/{date}"
  clean: true
  minify:
    enabled: true
    extensions: [ ".json", ".xml" ]

layers:
  - name: data
    description: "游戏数据（XML / JSON 配置 + 情报文本）"
    source: "data/"
    include: [ "**/*" ]
    exclude:
      # RAG 草稿（仅开发链用）
      - "rag/**"
      # 开发文档与设计稿（含 intelligenceMD 的设计草稿、equipment_mods/README、武器表填写公式 等）
      # data/ 内的 .md/.xlsx 全部是 dev 文档，可整段排除（教程目录里的 xlsx 是另一层）
      - "intelligenceMD/**"
      - "**/*.md"
      - "**/*.xlsx"
      # 已弃用配置（unused/ 里全是 -弃用 后缀文件，不在任何 list 引用链上；
      #   task/*_old.json 同性质孤立备份，如 mercenary_tasks_old.json，不在 list.xml 引用链）
      - "unused/**"
      - "task/*_old.json"
      # 关卡编辑器（独立 HTML/JS 应用，由 .lnk 启动，不属于运行时数据）
      - "levelEditor/**"
      - "**/*.lnk"
      # Python 开发工具与缓存（equipment_mods/ 下的 .py + __pycache__）
      - "**/*.py"
      # 测试加载器
      - "**/test_loader.as"

  - name: scripts
    description: "运行时脚本（仅 asLoader，源码不打包）"
    source: "scripts/"
    include:
      - "asLoader.swf"
    exclude: []

  - name: flashswf
    description: "编译后的 SWF 与运行时资源（排除 XFL 源工程）"
    source: "flashswf/"
    include:
      - "**/*.swf"
      - "**/*.png"
      - "**/*.flv"
      - "**/*.html"
      - "portraits/**/*.xml"
      # Ruffle 运行时（WebView2 overlay 的 cutscene-test 面板懒加载）
      - "_ruffle/**"
    exclude:
      # 非运行时目录
      - "unused/**"
      - "miniGames/**"
      - "ComicTool/**"
      # XFL 项目展开结构（防御性显式排除：即便后续 include 白名单放宽到 **/*.xml
      # 或 **/* 也不会泄漏 LIBRARY/META-INF/bin 与 4 个工程描述文件）
      - "**/LIBRARY/**"
      - "**/META-INF/**"
      - "**/bin/**"
      - "**/*.xfl"
      - "**/DOMDocument.xml"
      - "**/MobileSettings.xml"
      - "**/PublishSettings.xml"
      # arts/ 下只保留 new/ 目录和根级 .swf
      - "arts/things/**"
      - "arts/things0/**"
      - "arts/things1/**"
      - "arts/things2/**"
      - "arts/things3/**"
      - "arts/things4/**"
      - "arts/things5/**"
      - "arts/things切割/**"
      - "arts/renew/**"
      - "arts/原版素材库-子弹/**"
      - "arts/新版人物文字信息/**"
      - "arts/素材库-物品技能图标/**"
      # AI 草稿目录（落在 XFL 工程 LIBRARY/ 之外的设计稿，**/*.png 会误收进发行包）
      - "**/AI草稿/**"
      # 其他排除
      - "**/*.fla"
      - "**/*.xlsx"
      # 备份 SWF（things-备份.swf 等以 -备份 结尾的副本）
      - "**/*-备份.swf"
      # Ruffle 自带文档与 npm 元数据（运行时只需 .js/.wasm/.js.map）
      - "_ruffle/README.md"
      - "_ruffle/LICENSE_*"
      - "_ruffle/package.json"

  - name: sounds
    description: "音效导出文件 + manifest + BGM 音乐（含玩家自定义）"
    source: "sounds/"
    include:
      # SFX：FFDec 导出的独立音频文件（文件名即 linkageId，launcher 启动时扫描目录加载）。
      # 仍有 data/items/*.xml 直接引用 legacy .waz 文件名，不能单独排除；如需迁移，必须同轮改 XML 与资产。
      - "export/**/*"
      # BGM 配置与音乐文件（MusicCatalog 自动发现所有子目录下的音频）
      - "bgm_list.xml"
      - "README.md"
      - "**/*.mp3"
      - "**/*.wav"
      - "**/*.ogg"
      - "**/*.flac"
    exclude:
      # XFL 源工程（运行时不需要，音频已通过 export/ 提供）
      - "**/LIBRARY/**"
      - "**/META-INF/**"
      - "**/bin/**"
      - "**/DOMDocument.xml"
      - "**/PublishSettings.xml"
      - "**/MobileSettings.xml"
      - "**/*.swf"

  - name: config
    description: "运行时配置"
    source: "config/"
    include: [ "**/*" ]
    exclude:
      # 开发文档，不随发行包分发
      - "**/*.md"

  - name: root-files
    description: "根目录文件 — 用户面入口 + 游戏本体资产（极简，Core/managed DLL 全部归到 launcher-runtime 层）"
    source: "."
    include:
      # === 用户面入口：native C++ bootstrap（~160KB） ===
      # 双击此 exe 触发：检测 .NET 10 桌面运行时 → 缺失则 ShellExecute bundled installer
      # (tools/dotnet-runtime/) → ShellExecute runtime/Core.exe 转发命令行参数 + 注入 --project-root
      # 不依赖 .NET runtime，能在裸 Windows 跑
      # 即便机器上没装 runtime，也会在 logs/bootstrap.log 留追踪
      - "CRAZYFLASHER7MercenaryEmpire.exe"
      # 快捷键拦截辅助进程（独立 csc 编译，非主 csproj 输出）
      - "hotkey_guard.exe"
      # === Flash Player + SWF + 启动脚本 ===
      - "CRAZYFLASHER7MercenaryEmpire.swf"
      - "CRAZYFLASHER7MercenaryEmpire.bat"
      - "Adobe Flash Player 20.exe"
      # === 配置 ===
      - "config.xml"
      - "config.toml"
      - "crossdomain.xml"
      - "LICENSE"
      - "README.md"
    exclude: []

  - name: launcher-runtime
    description: "Launcher Core (FDD apphost + managed assemblies + native side-cars) — 部署到 projectRoot\\runtime\\ 子目录隐藏，避免用户误点 Core.exe 触发英文 .NET 缺失对话框"
    source: "runtime/"
    include:
      # FDD apphost + main managed assembly + .NET metadata
      - "CRAZYFLASHER7MercenaryEmpire.Core.exe"
      - "CRAZYFLASHER7MercenaryEmpire.Core.dll"
      - "CRAZYFLASHER7MercenaryEmpire.Core.deps.json"
      - "CRAZYFLASHER7MercenaryEmpire.Core.runtimeconfig.json"
      # ClearScript V8 引擎（eval/regex/搓招 DFA 依赖）— managed + native
      - "ClearScript.Core.dll"
      - "ClearScript.V8.dll"
      - "ClearScript.V8.ICUData.dll"
      - "ClearScriptV8.win-x64.dll"
      # JSON 序列化
      - "Newtonsoft.Json.dll"
      # WebView2（managed + native loader）
      - "Microsoft.Web.WebView2.Core.dll"
      - "Microsoft.Web.WebView2.WinForms.dll"
      - "Microsoft.Web.WebView2.Wpf.dll"
      - "WebView2Loader.dll"
      # Vortice.DXGI（GPU 适配器枚举 — GpuPreferenceManager 检测独显）
      - "Vortice.DXGI.dll"
      - "Vortice.DirectX.dll"
      - "Vortice.Mathematics.dll"
      - "SharpGen.Runtime.dll"
      - "SharpGen.Runtime.COM.dll"
      # Native side-cars（与 Core.exe 同目录，让 P/Invoke LoadLibrary 默认搜索能命中）
      - "miniaudio.dll"
      - "sol_parser.dll"
    exclude: []

  - name: runtime-installer
    description: ".NET 10 Desktop Runtime 官方 installer（首次启动 bootstrap 自动调用）"
    source: "tools/dotnet-runtime/"
    include:
      - "*.exe"
    exclude: []

  - name: launcher-web
    description: "WebView2 overlay 前端资源（HTML/CSS/JS/icons/Markdown 帮助/面板系统）"
    source: "launcher/web/"
    include:
      - "bootstrap.html"
      - "bootstrap-main.js"
      - "overlay.html"
      - "config/**"
      - "css/**"
      - "assets/**"
      - "data/**"
      - "lib/**"
      - "modules/**"
      - "help/**"
      # 图标已 WebP 化（2026-06 图标管线 WebP 化）：icons/ 是扁平目录，全部为运行时资产
      # （2397 webp + 17 遗留 png + manifest.json，无 dev 垃圾），整目录收，避免再被单一扩展名漏掉
      - "icons/**"
    exclude:
      # 已被 help-panel.js 替代，不再被 overlay.html 引用
      - "modules/help.js"
      # 开发期工具（font-probe）与早期 welcome 风格 mockup
      - "dev/**"
      - "mockups/**"
      # 各模块的 dev harness / preview / QA suite（map、stage-select、intelligence、arena、各 minigame）
      - "modules/**/dev/**"
      # pinalign 视觉参考快照（不被 panel 加载）
      - "modules/**/reference/**"
      # minigame 与 cursor/fonts 的开发 README
      - "modules/**/README.md"
      - "assets/cursor/native/README.md"
      - "assets/fonts/README.md"
      # 背景图开发脚本（_copy_bg.py 仅本地批量复制用）
      - "assets/**/_copy_bg.py"
      # 烘焙/导出审计报告（开发产物，非运行时加载）
      - "assets/**/report.json"

  - name: launcher-data
    description: "Launcher 运行时数据（MapHud catalog、存档修复字典、存档 schema）"
    source: "launcher/data/"
    include:
      # MapHudWidget 启动期加载，缺失 → useNativeHud=true 下 MapHud 静默不可见
      - "map_hud_data.json"
      # SaveAutoRepairService 启动期加载，缺失 → 自动修复降级到只读模式
      - "save_repair_dict.json"
      # 存档编辑器 diff 视图基线，缺失 → "已修改" tab 退化为 schema 默认值
      - "save_schema.json"
    exclude: []

  - name: launcher-scripts
    description: "V8 运行时 JS bundle（伤害数字渲染 + 搓招 DFA）"
    source: "launcher/scripts/dist/"
    include: [ "**/*" ]
    exclude: []

  - name: rapfi
    description: "Rapfi 五子棋引擎（GomokuTask 依赖）"
    source: "tools/rapfi/"
    include:
      # Windows CPU 变体：按运行时 CPU 能力选择
      # sse = 最低基线 fallback（无 AVX2 的老 CPU 必须保留）
      # avx2 = 主力分发（绝大多数现代 CPU）
      # avxvnni / avx512 / avx512vnni = 新 CPU 增强路径
      - "pbrain-rapfi-windows-sse.exe"
      - "pbrain-rapfi-windows-avx2.exe"
      - "pbrain-rapfi-windows-avxvnni.exe"
      - "pbrain-rapfi-windows-avx512.exe"
      - "pbrain-rapfi-windows-avx512vnni.exe"
      - "config.toml"
      - "*.bin"
      - "*.bin.lz4"
      # 开源许可证归属（分发必需）
      - "AUTHORS"
    exclude: []

  - name: root-dirs
    description: "根目录文件夹（字体、教程、fscommand 启动桥）"
    source: "."
    include:
      - "闪7重置版字体/**"
      - "0.说明文件与教程/**"
      # fscommand/launch_rag.bat：当前为 RAG dev 桥，同时给后续 DLC 预留外部进程启动通道，
      # 分发包必须保留；DLC 缺位时 fscommand("exec") 静默失败即可
      - "fscommand/**"
    exclude: []

globalExclude:
  - "**/.DS_Store"
  - "**/Thumbs.db"
  - "**/*.bak"
  - "**/__pycache__/**"
  # Office / WPS 临时锁文件（用户正在编辑时生成的占位，~$ 前缀）
  - "**/~$*"
  # 文件名带「请勿上传git」前后缀的设计稿（含 data/items/ 与 0.说明文件与教程/ 的填表 Excel）
  - "**/*请勿上传git*"
  # 构建中间产物 / IDE 缓存（worktree 模式裸扫描不读 .gitignore，防御性兜底；零误伤集）
  - "**/*.log"
  - "**/*.obj"
  - "**/.vs/**"
  # 根级 AS2 测试加载器（防御性；root-files 白名单已不会收入）
  - "**/test_npc_loader.as"

# 当前已支持打包工具内手动编辑

# 顶层 CRAZYFLASHER7MercenaryEmpire/（主程序 XFL 工程源：.xfl + LIBRARY/META-INF/bin）= Flash 编译源；
#   其产物 CRAZYFLASHER7MercenaryEmpire.swf 已由 root-files 层收，源工程本身刻意不入包
#   （各层均为白名单，故此目录与 .sln / global.json / automation/ 等构建期文件天然不会进包）
# 顶层 xml/（list.xml + tasksUnicode/）= 原版闪客快打7历史残留，运行时无加载方，刻意不入包
# 顶层 amf0-help/ 与 amf0-help.zip（sol_parser 上游 issue 调研 + Rust 源 + probe）= 纯开发研究产物，刻意不入包
#   （发行用的 sol_parser.dll 由 launcher-runtime 层从 runtime/ 收编，是编译产物）
# 顶层 music/ 目录为原版闪7历史 BGM 残留（当前点歌器已迁移至 sounds/ + MusicCatalog，
#   且 XFL 内旧点歌器代码已被注释），刻意不入包；BGM 实际由 sounds/ 下各专辑目录直收
# externalAssets（Unity 外壳）暂不支持，后续再加
