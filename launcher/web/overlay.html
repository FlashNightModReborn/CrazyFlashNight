<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<title>CF7:ME Overlay</title>
<link rel="stylesheet" href="css/overlay.css">
</head>
<body>

<!-- Toast container -->
<div id="toast-container"></div>

<!-- Notch: 单行布局，左侧 FPS 区域 + 右侧工具栏按钮 -->
<div id="notch">
    <div id="notch-pill">
        <!-- 第一行：经济 | FPS | 经济 -->
        <div id="notch-row1">
            <div id="currency-gold" class="currency-panel">
                <span class="currency-icon">$</span>
                <span class="currency-value">0</span>
                <span class="currency-delta"></span>
            </div>
            <div class="notch-divider"></div>
            <div id="notch-center">
                <span id="notch-fps" class="notch-fps">--</span>
                <span id="notch-perf-badge" class="perf-badge" title="性能等级">L0</span>
                <canvas id="notch-sparkline" width="70" height="16"></canvas>
                <canvas id="notch-clock" width="16" height="16"></canvas>
                <span id="notch-stats" class="notch-stats"></span>
                <span id="notch-expand" class="notch-expand-btn">&#9660;</span>
            </div>
            <div class="notch-divider"></div>
            <div id="currency-kpoint" class="currency-panel">
                <span class="currency-icon">K</span>
                <span class="currency-value">0</span>
                <span class="currency-delta"></span>
            </div>
            <div id="notch-row1-right">
                <button data-key="F">全屏</button>
                <button data-key="LOG">日志</button>
                <div class="notch-submenu-wrap">
                    <button class="notch-submenu-trigger">其他 &#9656;</button>
                    <div class="notch-submenu">
                        <button data-key="Q">Q 强退</button>
                        <button data-key="W">W 关闭</button>
                        <button data-key="R">R 重置</button>
                        <button data-key="P">P 截图</button>
                        <button data-key="O">O 打开</button>
                    </div>
                </div>
            </div>
        </div>
        <!-- 第二行：游戏功能按钮（展开时可见） -->
        <div id="notch-toolbar">
            <button data-key="PETS" title="战宠">🐾 战宠</button>
            <button data-key="MERCS" title="佣兵">⚔ 佣兵</button>
            <button data-key="TABLET" title="平板电脑">💻 平板</button>
            <button data-key="WAREHOUSE" title="后勤战备箱">📦 战备箱</button>
            <button data-key="SHOP" title="商城">🛒 商城</button>
        </div>
    </div>
    <div id="notch-info"></div>
    <!-- 展开详细图（点击 sparkline 切换） -->
    <div id="notch-expanded-panel">
        <canvas id="notch-expanded-canvas"></canvas>
        <div class="expanded-hint">点击关闭</div>
    </div>
</div>
<!-- 右上角工具条：独立于 notch，固定定位 -->
<div id="top-right-tools">
    <button data-key="GAMESETTINGS" title="系统设置">⚙</button>
    <button data-key="SETTINGS" title="修改器">🔧</button>
    <button id="notch-pause" data-key="PAUSE" title="暂停/继续">&#9208;</button>
    <button data-key="HELP" title="帮助">?</button>
    <button data-key="SAFEEXIT" title="安全退出">&#10005;</button>
</div>

<!-- BGM 可视化面板：紧贴右上角工具条下方 -->
<div id="jukebox-panel">
    <div id="jukebox-header">
        <button id="jukebox-toggle" title="展开/折叠">&#9835; 点歌</button>
        <span id="jukebox-title">未播放</span>
        <span id="jukebox-time"></span>
    </div>
    <div id="jukebox-body">
        <canvas id="jukebox-wave" width="160" height="32"></canvas>
        <div id="jukebox-progress">
            <div id="jukebox-prog-fill"></div>
        </div>
        <div id="jukebox-browser">
            <div id="jukebox-toolbar">
                <select id="jukebox-album-select">
                    <option value="">全部</option>
                </select>
                <div id="jukebox-help-btn" title="帮助">?</div>
                <div id="jukebox-settings">
                    <div id="jukebox-settings-toggle" title="设置">&#9881;</div>
                    <div id="jukebox-settings-menu">
                        <div class="jb-setting-item" data-key="override">
                            <span class="jb-setting-dot"></span>
                            <span class="jb-setting-label">覆盖关卡BGM</span>
                        </div>
                        <div class="jb-setting-item" data-key="trueRandom">
                            <span class="jb-setting-dot"></span>
                            <span class="jb-setting-label">真随机</span>
                        </div>
                    </div>
                </div>
            </div>
            <div id="jukebox-track-list"></div>
        </div>
    </div>
</div>

<div id="jukebox-help-modal">
    <div id="jukebox-help-content"></div>
    <div id="jukebox-help-close">关闭</div>
</div>

<script src="lib/marked.min.js"></script>
<script src="modules/bridge.js"></script>
<script src="modules/uidata.js"></script>
<script src="modules/toast.js"></script>
<script src="modules/sparkline.js"></script>
<script src="modules/notch.js"></script>
<script src="modules/currency.js"></script>
<script src="modules/jukebox.js"></script>
<script>
(function() {
    window.addEventListener('load', function() {
        Bridge.send({ type: 'ready' });
    });
})();
</script>
</body>
</html>
