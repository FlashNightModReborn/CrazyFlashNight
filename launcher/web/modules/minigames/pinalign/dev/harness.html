<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<title>PinAlign Harness</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="../../../../css/panels.css">
<link rel="stylesheet" href="../../shared/minigame-shell.css">
<link rel="stylesheet" href="../../shared/dev/harness-base.css">
<link rel="stylesheet" href="../pinalign.css">
</head>
<body>
<div id="panel-container" data-panel="pinalign">
    <div id="panel-backdrop"></div>
    <div id="panel-content"></div>
</div>

<script>
window.__minigameOverlayRoot = "../../../../";
</script>
<script src="../../../bridge.js"></script>
<script src="../../../panels.js"></script>
<script src="../../shared/host-bridge.js"></script>
<script src="../../shared/dev/harness-base.js"></script>
<script src="../core/index.js"></script>
<script src="../app/level-specs.js"></script>
<script src="../adapter/dom-adapter.js"></script>
<script src="../pinalign-audio.js"></script>
<script src="../pinalign-panel.js"></script>
<script src="./qa-suite.js"></script>
<script>
(function() {
    "use strict";

    var query = MinigameHarness.parseQuery(location.search);

    function buildInit(overrides) {
        var out = {
            mode: "dev",
            specId: query.specId || "mvp-3pin-v1",
            masterSeed: query.masterSeed || "harness-seed",
            debug: true
        };
        var key;
        overrides = overrides || {};
        for (key in overrides) out[key] = overrides[key];
        return out;
    }

    function bootSession(api, overrides) {
        var init = buildInit(overrides);
        var readyCount = api.getSessionEvents("ready").length;
        if (window.PinAlignPanel && PinAlignPanel._debugBoot) {
            PinAlignPanel._debugBoot(init);
        } else {
            Panels.open("pinalign", init);
        }
        return api.waitForNextSessionEvent("ready", readyCount, 4000).then(function() {
            return PinAlignPanel._debugGetState();
        });
    }

    function autoplayOnce(api) {
        return bootSession(api).then(function() {
            var hint = PinAlignPanel._debugGetHint();
            api.assert(!!hint, "hint missing");
            PinAlignPanel._debugClickTile(hint.from);
            PinAlignPanel._debugHoverTile(hint.to);
            PinAlignPanel._debugClickTile(hint.to);
            var state = PinAlignPanel._debugGetState();
            api.assert(state.moveIndex >= 1, "move index did not advance");
            api.assert(api.getSessionEvents("turn").length > 0, "turn event missing");
            return "moveIndex=" + state.moveIndex + ", status=" + state.status;
        });
    }

    function exportReplay(api) {
        return autoplayOnce(api).then(function() {
            var replay = PinAlignPanel._debugExportReplay();
            api.assert(!!replay, "replay missing");
            api.assert(replay.actions && replay.actions.length > 0, "replay actions missing");
            api.assert(api.getSessionEvents("export").length > 0, "export event missing");
            return "actions=" + replay.actions.length;
        });
    }

    function browserCases(api) {
        return [
            {
                id: "pa-ui1",
                title: "protocol emits open+ready with requested/resolved split",
                run: function() {
                    return bootSession(api).then(function() {
                        var openEvent = api.getSessionEvents("open").slice(-1)[0];
                        var readyEvent = api.getSessionEvents("ready").slice(-1)[0];
                        api.assert(!!openEvent && !!readyEvent, "open/ready events missing");
                        api.assert(!!openEvent.payload.data.requested, "open.requested missing");
                        api.assert(openEvent.payload.data.resolved === null, "open.resolved should be null");
                        api.assert(!!readyEvent.payload.data.resolved, "ready.resolved missing");
                        api.assert(!!readyEvent.payload.data.metrics, "ready.metrics missing");
                        return "open/ready envelope present";
                    });
                }
            },
            {
                id: "pa-ui2",
                title: "layout keeps PinAlign side pane and shell spacing",
                run: function() {
                    return bootSession(api).then(function() {
                        var layout = api.captureLayout();
                        api.assertEqual(layout.main.gap, "10px", "pinalign main gap");
                        api.assert(layout.side.width >= 250 && layout.side.width <= 320, "pinalign side width out of range: " + layout.side.width);
                        api.assert(layout.side.overflowY === "auto" || layout.side.overflow === "auto", "side pane should scroll");
                        return "gap=" + layout.main.gap + ", sideWidth=" + layout.side.width;
                    });
                }
            },
            {
                id: "pa-ui3",
                title: "hint-driven autoplay emits a turn session",
                run: function() {
                    return autoplayOnce(api);
                }
            },
            {
                id: "pa-ui4",
                title: "export replay emits export session with actions",
                run: function() {
                    return exportReplay(api);
                }
            }
        ];
    }

    function runSuite(api, caseId) {
        var defs = [];
        var i;
        for (i = 0; i < PinAlignQA.SUITE.length; i += 1) {
            defs.push({
                id: PinAlignQA.SUITE[i].id,
                title: PinAlignQA.SUITE[i].title,
                run: (function(id) {
                    return function() {
                        var result = PinAlignQA.runOne(PinAlignCore, PinAlignLevels, id);
                        if (!result.pass) throw new Error(result.detail || "logic suite failed");
                        return result.detail || "pass";
                    };
                })(PinAlignQA.SUITE[i].id)
            });
        }
        defs = defs.concat(browserCases(api));
        if (caseId) {
            defs = defs.filter(function(item) { return item.id === caseId; });
        }
        var results = [];
        var flow = Promise.resolve();
        defs.forEach(function(def) {
            flow = flow.then(function() {
                return api.runCase(def.id, def.title, function() {
                    return def.run(api);
                });
            }).then(function(result) {
                results.push(result);
            });
        });
        return flow.then(function() {
            return MinigameHarness.normalizeBundle(results);
        });
    }

    function collectDump(api) {
        return {
            layout: api.captureLayout(),
            session: window.PinAlignPanel && PinAlignPanel._debugGetSession ? PinAlignPanel._debugGetSession() : null,
            state: window.PinAlignPanel && PinAlignPanel._debugGetState ? PinAlignPanel._debugGetState() : null
        };
    }

    var harness = MinigameHarness.create({
        panelId: "pinalign",
        title: "PinAlign QA",
        openPanel: function() {
            Panels.open("pinalign", buildInit());
        },
        runScenario: function(api, scenario) {
            if (scenario === "export") return exportReplay(api);
            return autoplayOnce(api);
        },
        runSuite: runSuite,
        collectDump: collectDump
    });

    window.addEventListener("load", function() {
        harness.boot();
    });
})();
</script>
</body>
</html>
