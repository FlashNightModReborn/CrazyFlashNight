# CF7-Packer 打包配置
# 基于 2.71 整包精确分析得出的规则

version: 1
meta:
  name: "闪客快打7重置计划"

source:
  mode: worktree
  tag: null
  repoRoot: "../../"

output:
  dir: "./output/{version}"
  clean: true
  minify:
    enabled: true
    extensions: [ ".json", ".xml" ]

layers:
  - name: data
    description: "游戏数据（XML 配置）"
    source: "data/"
    include: [ "**/*" ]
    exclude: [ rag/*, task/agent_tasks.json, task/text/agent_text.json ]

  - name: scripts
    description: "运行时脚本（仅 asLoader，源码不打包）"
    source: "scripts/"
    include:
      - "asLoader.swf"
    exclude: []

  - name: flashswf
    description: "编译后的 SWF 与运行时资源（排除 XFL 源工程）"
    source: "flashswf/"
    include:
      - "**/*.swf"
      - "**/*.png"
      - "**/*.flv"
      - "**/*.html"
      - "portraits/**/*.xml"
    exclude:
      # 非运行时目录
      - "unused/**"
      - "miniGames/**"
      - "ComicTool/**"
      - "Langrage/**"
      # XFL 项目展开结构（LIBRARY/ 子目录中的 .png 等资源）
      - "**/LIBRARY/**"
      - "**/META-INF/**"
      # arts/ 下只保留 new/ 目录和根级 .swf
      - "arts/things0/**"
      - "arts/things1/**"
      - "arts/things2/**"
      - "arts/things3/**"
      - "arts/things4/**"
      - "arts/things5/**"
      - "arts/things切割/**"
      - "arts/renew/**"
      - "arts/原版素材库-子弹/**"
      - "arts/新版人物文字信息/**"
      - "arts/素材库-物品技能图标/**"
      # 其他排除
      - "**/*.fla"
      - "arts/原版素材库-子弹_横向拖尾联弹.swf"

  - name: sounds
    description: "音效导出文件 + manifest + BGM 音乐（含玩家自定义）"
    source: "sounds/"
    include:
      # SFX：FFDec 导出的独立音频文件（文件名即 linkageId，launcher 启动时扫描目录加载）
      - "export/**/*"
      # BGM 配置与音乐文件（MusicCatalog 自动发现所有子目录下的音频）
      - "bgm_list.xml"
      - "README.md"
      - "**/*.mp3"
      - "**/*.wav"
      - "**/*.ogg"
      - "**/*.flac"
    exclude:
      # XFL 源工程（运行时不需要，音频已通过 export/ 提供）
      - "*/LIBRARY/**"
      - "*/META-INF/**"
      - "*/bin/**"
      - "*/DOMDocument.xml"
      - "*/PublishSettings.xml"
      - "*/MobileSettings.xml"
      - "*.swf"
      # 音乐包独立外置（与 cf7-packer/README 口径对齐，避免 **/*.mp3 等通配误收）
      - "music/**"

  - name: config
    description: "运行时配置"
    source: "config/"
    include: [ "**/*" ]
    exclude:
      # 开发文档，不随发行包分发
      - "**/*.md"

  - name: root-files
    description: "根目录可执行文件、DLL 与配置"
    source: "."
    include:
      # Guardian 启动器 + 快捷键拦截辅助进程
      - "CRAZYFLASHER7MercenaryEmpire.exe"
      - "hotkey_guard.exe"
      # ClearScript V8 引擎（eval/regex task 依赖）
      - "ClearScript.Core.dll"
      - "ClearScript.V8.dll"
      - "ClearScript.V8.ICUData.dll"
      - "ClearScriptV8.win-x64.dll"
      # JSON 序列化
      - "Newtonsoft.Json.dll"
      # miniaudio 原生音频引擎
      - "miniaudio.dll"
      # Rust SOL 解析器（Protocol 2 存档决议硬依赖）
      - "sol_parser.dll"
      # SharpDX（D3D overlay 渲染）
      - "SharpDX.dll"
      - "SharpDX.DXGI.dll"
      - "SharpDX.Direct3D11.dll"
      - "SharpDX.D3DCompiler.dll"
      # WebView2（幽灵输入解耦 overlay）
      - "Microsoft.Web.WebView2.Core.dll"
      - "Microsoft.Web.WebView2.WinForms.dll"
      - "WebView2Loader.dll"
      # Flash Player + SWF + 启动脚本
      - "CRAZYFLASHER7MercenaryEmpire.swf"
      - "CRAZYFLASHER7MercenaryEmpire.bat"
      - "Adobe Flash Player 20.exe"
      # 配置
      - "config.xml"
      - "config.toml"
      # Flash 跨域策略（socket/HTTP 沙箱校验硬依赖）
      - "crossdomain.xml"
      - "LICENSE"
      - "README.md"
    exclude: []

  - name: launcher-web
    description: "WebView2 overlay 前端资源（HTML/CSS/JS/icons/Markdown 帮助/面板系统）"
    source: "launcher/web/"
    include:
      - "bootstrap.html"
      - "bootstrap-main.js"
      - "overlay.html"
      - "config/**"
      - "css/**"
      - "assets/**"
      - "data/**"
      - "lib/**"
      - "modules/**"
      - "help/**"
      - "icons/manifest.json"
      - "icons/**/*.png"
    exclude:
      # 已被 help-panel.js 替代，不再被 overlay.html 引用
      - "modules/help.js"

  - name: launcher-scripts
    description: "V8 运行时 JS bundle（伤害数字渲染 + 搓招 DFA）"
    source: "launcher/scripts/dist/"
    include: [ "**/*" ]
    exclude: []

  - name: rapfi
    description: "Rapfi 五子棋引擎（GomokuTask 依赖）"
    source: "tools/rapfi/"
    include:
      # Windows CPU 变体：按运行时 CPU 能力选择
      # sse = 最低基线 fallback（无 AVX2 的老 CPU 必须保留）
      # avx2 = 主力分发（绝大多数现代 CPU）
      # avxvnni / avx512 / avx512vnni = 新 CPU 增强路径
      - "pbrain-rapfi-windows-sse.exe"
      - "pbrain-rapfi-windows-avx2.exe"
      - "pbrain-rapfi-windows-avxvnni.exe"
      - "pbrain-rapfi-windows-avx512.exe"
      - "pbrain-rapfi-windows-avx512vnni.exe"
      - "config.toml"
      - "*.bin"
      - "*.bin.lz4"
      # 开源许可证归属（分发必需）
      - "AUTHORS"
    exclude: []

  - name: root-dirs
    description: "根目录文件夹（字体、教程）"
    source: "."
    include:
      - "闪7重置版字体/**"
      - "0.说明文件与教程/**"
      - fscommand/**
    exclude: []

globalExclude:
  - "**/.DS_Store"
  - "**/Thumbs.db"
  - "**/*.bak"

# 当前已支持打包工具内手动编辑

# music/ 不打包（音乐包独立外置），后续需要时加一个 layer 即可
# externalAssets（Unity 外壳）暂不支持，后续再加
